<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄枢集群协作</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div id="cluster-badge" class="cluster-badge hidden">🤝 协作模式</div>
    <div id="toast" class="toast hidden"></div>

    <!-- 密码输入弹窗 -->
    <div id="password-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: flex; align-items: center; justify-content: center;">
        <div style="background: white; padding: 24px; border-radius: 12px; width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
            <h3 style="margin-bottom: 16px; color: #007bff;">🔒 房间需要密码</h3>
            <div class="form-group">
                <label>请输入房间密码</label>
                <input type="password" id="room-password-input" placeholder="输入密码" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div style="display: flex; gap: 8px; margin-top: 16px;">
                <button id="password-cancel" class="btn" style="background: #6c757d; flex: 1;">取消</button>
                <button id="password-confirm" class="btn" style="flex: 1;">确认进入</button>
            </div>
        </div>
    </div>

    <!-- 加入房间完整表单弹窗 -->
    <div id="join-room-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; display: flex; align-items: center; justify-content: center;">
        <div style="background: white; padding: 24px; border-radius: 12px; width: 420px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
            <h3 style="margin-bottom: 16px; color: #007bff;">🔗 加入房间</h3>
            <div class="form-group">
                <label>成员花名（必填）</label>
                <input type="text" id="join-modal-name" placeholder="例如：清风明月" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div class="form-group">
                <label>使用模型（自动读取本地配置）</label>
                <select id="join-modal-model" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;"></select>
            </div>
            <div class="form-group">
                <label>房间密码（如果有，请输入，无密码可留空）</label>
                <input type="password" id="join-modal-password" placeholder="输入密码（留空表示无密码）" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div style="display: flex; gap: 8px; margin-top: 16px;">
                <button id="join-modal-cancel" class="btn" style="background: #6c757d; flex: 1;">取消</button>
                <button id="join-modal-confirm" class="btn" style="flex: 1;">确认加入</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 左侧导航 -->
        <div class="panel">
            <div class="panel-title">协作导航</div>
            <button id="nav-collab-chat" class="btn hidden" onclick="showView('collab-chat')">💬 协作对话</button>
            <button class="btn" onclick="showView('room-list')">🏠 房间列表</button>
            <button class="btn" onclick="showView('create-room')">➕ 创建房间</button>
            <button class="btn" onclick="showView('join-room')">🔗 加入房间</button>
            <button class="btn" onclick="showView('model-manage')">⚙️ 模型管理</button>
            <button class="btn" onclick="showView('skill-manage')">🔧 技能管理</button>
            <button class="btn" onclick="showView('conversation-history')">📚 对话历史</button>
            <button class="btn" onclick="showView('stats')">📊 数据统计</button>
            <button class="btn" onclick="enterStandaloneMode()">💬 单机对话</button>

            <hr style="margin: 12px 0; border: none; border-top: 1px solid #eee;">
            <div id="current-room-info" class="hidden">
                <strong>当前房间</strong>
                <p id="room-name-display" style="font-size:13px;color:#007bff;"></p>
                <button class="btn btn-danger" onclick="handleRoomExit()">🚪 退出房间</button>
            </div>
        </div>

        <!-- 中间主视图 -->
        <div class="panel">
            <div class="panel-title">
                <span id="view-title">房间列表</span>
                <span style="float:right;font-size:12px;color:#666;" id="room-status"></span>
            </div>

            <!-- 房间列表视图 -->
            <div id="view-room-list">
                <div class="form-group">
                    <input type="text" id="room-search" placeholder="🔍 搜索房间..." oninput="filterRooms()">
                </div>
                <div id="room-list-container"></div>
                <div style="display:flex; gap:8px; margin-top:8px;">
                    <button class="btn" onclick="refreshRooms()" style="flex:1;">🔄 刷新</button>
                    <button class="btn" onclick="showView('join-room')" style="flex:1; background:#28a745;">📍 手动输入地址加入房间</button>
                </div>
            </div>

            <!-- 创建房间视图 -->
            <div id="view-create-room" class="hidden">
                <div class="form-group">
                    <label>房间名称（必填）</label>
                    <input type="text" id="new-room-name" placeholder="例如：项目A协作室">
                </div>
                <div class="form-group">
                    <label>房主名称（必填）</label>
                    <input type="text" id="new-room-owner" placeholder="例如：玄枢">
                </div>
                <div class="form-group">
                    <label>选择模型</label>
                    <select id="new-room-model">
                        <option value="qwen2.5-coder:7b">qwen2.5-coder:7b (代码专精)</option>
                        <option value="qwen2.5:7b">qwen2.5:7b (通用)</option>
                        <option value="llama3:8b">llama3:8b</option>
                        <option value="phi3:3.8b">phi3:3.8b (轻量)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>房间密码（可选）</label>
                    <input type="password" id="new-room-password" placeholder="设置房间密码，最多32字符">
                </div>
                <button class="btn" onclick="createRoom()">✅ 创建房间</button>
            </div>

            <!-- 加入房间视图 -->
            <div id="view-join-room" class="hidden">
                <div class="form-group">
                    <label>房间地址（IP:端口，玄枢默认端口为30001）</label>
                    <input type="text" id="join-room-host" placeholder="例如：192.168.1.100:30001">
                </div>
                <div class="form-group">
                    <label>房间名称（可选）</label>
                    <input type="text" id="join-room-name" placeholder="如果广播中有房间名可填">
                </div>
                <div class="form-group">
                    <label>成员名称（花名）</label>
                    <input type="text" id="join-member-name" placeholder="例如：清风明月">
                </div>
                <div class="form-group">
                    <label>协作模式</label>
                    <select id="join-mode">
                        <option value="auto">🤖 自动（任务自动执行）</option>
                        <option value="manual">👤 人工干预（需确认）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>选择模型</label>
                    <select id="join-model">
                        <option value="qwen2.5-coder:7b">qwen2.5-coder:7b</option>
                        <option value="qwen2.5:7b">qwen2.5:7b</option>
                        <option value="llama3:8b">llama3:8b</option>
                        <option value="phi3:3.8b">phi3:3.8b</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>房间密码（如果有）</label>
                    <input type="password" id="join-room-password" placeholder="如果房间有密码请输入">
                </div>
                <button class="btn" onclick="joinRoom()">🔗 加入房间</button>
            </div>

            <!-- 房间详情视图 -->
            <div id="view-room-detail" class="hidden">
                <div style="margin-bottom: 16px;">
                    <h3 id="detail-room-name" style="color:#007bff;"></h3>
                    <p style="font-size:13px;color:#666;">
                        ID: <span id="detail-room-id"></span> | 房主: <span id="detail-room-owner"></span> | 房主模型: <span id="detail-room-model"></span>
                    </p>
                    <div class="mode-indicator">
                        我的模式: <span id="detail-my-mode" style="font-weight:bold;"></span>
                    </div>
                </div>

                <div style="margin-bottom:16px; padding:12px; background:#e8f4fd; border-radius:8px;">
                    <h4>👤 我的信息</h4>
                    <div style="display:flex; gap:16px; flex-wrap:wrap;">
                        <div>
                            <label style="font-size:12px;color:#666;">花名</label>
                            <input type="text" id="my-nickname" placeholder="输入花名" style="width:150px;padding:6px;border:1px solid #ddd;border-radius:4px;">
                        </div>
                        <div>
                            <label style="font-size:12px;color:#666;">使用模型</label>
                            <select id="my-model" style="width:200px;padding:6px;border:1px solid #ddd;border-radius:4px;">
                                <option value="qwen2.5-coder:7b">Qwen2.5-Coder 7B</option>
                                <option value="qwen2.5-coder:14b">Qwen2.5-Coder 14B</option>
                                <option value="deepseek-coder:6.7b">DeepSeek Coder 6.7B</option>
                                <option value="starcode:7b">StarCoder 7B</option>
                            </select>
                        </div>
                        <button class="btn" style="height:32px;padding:0 12px;font-size:12px;" onclick="updateMyInfo()">💾 保存</button>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
                    <div>
                        <h4>👥 成员列表</h4>
                        <div id="member-list" style="max-height:300px;overflow-y:auto;"></div>
                    </div>
                    <div>
                        <h4>📋 任务日志</h4>
                        <div id="task-log" class="task-log"></div>
                    </div>
                </div>

                <div style="margin-top:16px; display:flex; gap:8px;">
                    <button class="btn" id="btn-start-task" onclick="startCollabChat()">🚀 开始协作对话</button>
                    <button class="btn btn-danger" id="btn-leave-room" onclick="handleRoomExit()">🔒 退出房间</button>
                </div>
            </div>

            <!-- 模型管理视图 -->
            <div id='view-model-manage' class='hidden'>
                <div class='panel-title'>⚙️ 模型管理 <button class="btn" style="float:right;font-size:12px;padding:2px 8px;width:auto;" onclick="loadModelList(true)">🔄 刷新</button></div>
                <div id='model-list' style='max-height:400px;overflow-y:auto;margin-bottom:16px;'></div>
                <div>
                    <h4>添加 / 编辑 模型</h4>
                    <input type='hidden' id='model-original-name' value=''>
                    <div class='form-group'>
                        <label>名称</label>
                        <input type='text' id='model-name' placeholder='例如：MyModel'>
                    </div>
                    <div class='form-group'>
                        <label>提供商</label>
                        <select id='model-provider'>
                            <option value='ollama'>Ollama</option>
                            <option value='openai_compatible'>OpenAI 兼容</option>
                            <option value='custom'>自定义</option>
                        </select>
                    </div>
                    <div class='form-group'>
                        <label>模型名称</label>
                        <input type='text' id='model-model-name' placeholder='例如：qwen2.5:7b'>
                    </div>
                    <div class='form-group'>
                        <label>API 地址</label>
                        <input type='text' id='model-api-base' placeholder='http://localhost:11434'>
                    </div>
                    <div class='form-group'>
                        <label>API 密钥（如果是ollama可留空）</label>
                        <input type='password' id='model-api-key' placeholder=''>
                    </div>
                    <button class='btn' onclick='saveModel()'>保存</button>
                </div>
            </div>

            <!-- 对话历史视图 -->
            <div id='view-conversation-history' class='hidden'>
                <div class='panel-title'>📚 对话历史</div>
                <div id='conversation-list' style='max-height:400px;overflow-y:auto;'></div>
            </div>

            <!-- 技能管理视图 -->
            <div id='view-skill-manage' class='hidden'>
                <div class='panel-title'>🔧 技能管理 <button class="btn" style="float:right;font-size:12px;padding:2px 8px;width:auto;" onclick="loadSkillList()">🔄 刷新</button></div>
                <div class="form-group">
                    <input type="text" id="skill-search" placeholder="🔍 搜索技能..." oninput="filterSkills()" style="width:100%;">
                </div>
                <div id='skill-list' style='max-height:400px;overflow-y:auto;margin-bottom:16px;'></div>

                <!-- 技能详情弹窗 -->
                <div id="skill-detail-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: flex; align-items: center; justify-content: center;">
                    <div style="background: white; padding: 24px; border-radius: 12px; width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
                        <h3 style="margin-bottom: 16px; color: #007bff;" id="detail-skill-name">技能详情</h3>
                        <div id="detail-skill-content" style="font-size: 14px; line-height: 1.6;"></div>
                        <div style="display: flex; gap: 8px; margin-top: 16px;">
                            <button class="btn" style="background: #6c757d; flex: 1;" onclick="closeSkillDetail()">关闭</button>
                            <button class="btn btn-danger" style="flex: 1;" onclick="deleteCurrentSkill()">删除技能</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 数据统计视图 -->
            <div id='view-stats' class='hidden'>
                <div class='panel-title'>📊 数据统计</div>
                <div id='stats-container' style='padding:12px;'>
                    <p>正在加载统计数据...</p>
                </div>
            </div>

            <!-- 单机对话视图 -->
            <div id='view-chat' class='hidden'>
                <div class='panel-title'>💬 单机对话</div>
                <div id='messages' style='height:400px;overflow-y:auto;border:1px solid #ddd;border-radius:4px;padding:12px;margin-bottom:12px;background:#f8f9fa;'></div>
                <div style='display:flex;gap:8px;margin-bottom:8px;'>
                    <textarea id='message-input' placeholder='输入消息...' style='flex:1;padding:8px;border:1px solid #ddd;border-radius:4px;resize:none;height:60px;'></textarea>
                    <button id='send-btn' class='btn' style='width:80px;'>发送</button>
                </div>
                <div style='display:flex;gap:8px;'>
                    <button class='btn' style='font-size:12px;padding:4px 8px;width:auto;' onclick='exportConversation("md")'>📥 导出Markdown</button>
                    <button class='btn' style='font-size:12px;padding:4px 8px;width:auto;' onclick='exportConversation("json")'>📥 导出JSON</button>
                </div>
            </div>

            <!-- 协作对话视图 -->
            <div id='view-collab-chat' class='hidden'>
                <div class='panel-title'>🤝 协作对话 <button class="btn" style="float:right;font-size:12px;padding:2px 8px;width:auto;" onclick="showView('room-detail')">🔙 返回房间</button></div>

                <div style="display:grid; grid-template-columns: 1fr 280px; gap:16px;">
                    <div style="display:flex;flex-direction:column;">
                        <div id='collab-messages' style='flex:1;min-height:400px;max-height:500px;overflow-y:auto;border:1px solid #ddd;border-radius:4px;padding:12px;background:#f8f9fa;'></div>
                        <div style='display:flex;gap:8px;margin-top:12px;'>
                            <textarea id='collab-message-input' placeholder='向协作Agent发送指令...' style='flex:1;padding:8px;border:1px solid #ddd;border-radius:4px;resize:none;height:60px;'></textarea>
                            <button id='collab-send-btn' class='btn' style='width:80px;' onclick="sendCollabMessage()">发送</button>
                        </div>
                        <div style='display:flex;gap:8px;margin-top:8px;'>
                            <button class='btn' style='font-size:12px;padding:4px 8px;width:auto;' onclick='exportConversation("md")'>📥 导出Markdown</button>
                            <button class='btn' style='font-size:12px;padding:4px 8px;width:auto;' onclick='exportConversation("json")'>📥 导出JSON</button>
                        </div>
                    </div>

                    <div style="border:1px solid #ddd;border-radius:8px;padding:12px;">
                        <h4>👥 成员状态</h4>
                        <div id="collab-members-panel" style="max-height:400px;overflow-y:auto;">
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧信息面板 -->
        <div class="panel">
            <div class="panel-title">状态信息</div>
            <div id="status-info">
                <p>🖥️ 本机节点: <span id="local-node-id">未就绪</span></p>
                <p>🔌 API 服务: <span id="api-status" style="color:red;">未连接</span></p>
                <p>📡 WebSocket: <span id="ws-status" style="color:red;">未连接</span></p>
                <p>👥 在线成员: <span id="online-count">0</span></p>
            </div>
            <hr style="margin:12px 0; border:none; border-top:1px solid #eee;">
            <div id="auth-section" class="hidden">
                <strong>🔐 待审批</strong>
                <div id="pending-list" style="margin-top:8px;font-size:13px;"></div>
            </div>
            <hr style="margin:12px 0; border:none; border-top:1px solid #eee;">
            <div>
                <strong>🤖 当前模型</strong>
                <div id="current-model" style="font-size:13px;margin-top:8px;color:#007bff;">未选择</div>
                <button class="btn" id="btn-switch-model" onclick="showView('model-manage')" style="margin-top:8px;font-size:12px;padding:4px 8px;width:auto;">切换模型</button>
            </div>
            <hr style="margin:12px 0; border:none; border-top:1px solid #eee;">
            <div>
                <strong>📚 当前对话</strong>
                <div id="current-conversation" style="font-size:13px;margin-top:8px;">未选择</div>
                <button class="btn" id="btn-new-standalone-conversation" onclick="createNewStandaloneConversation()" style="margin-top:8px;">➕ 新建单机对话</button>
                <button class="btn" id="btn-new-collab-conversation" onclick="createNewCollabConversation()" style="margin-top:8px; display: none;">🤝 新建协作对话</button>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
